<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hijrah Sisters - Admin CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Auth SDK Only -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex">

    <!-- Login Screen -->
    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-96 border border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-center text-pink-400">Admin Login</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" class="w-full mb-4 p-3 bg-gray-700 border-none rounded text-white" required>
                <input type="password" id="password" placeholder="Password" class="w-full mb-6 p-3 bg-gray-700 border-none rounded text-white" required>
                <button type="submit" class="w-full bg-pink-600 text-white p-3 rounded font-bold hover:bg-pink-700">Login</button>
            </form>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col hidden" id="sidebar">
        <div class="p-6 font-bold text-xl border-b border-gray-700 text-pink-400">CMS Panel</div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto" id="menu-container"></nav>
        <button id="logout-btn" class="p-4 bg-gray-700 hover:bg-gray-600 text-center font-bold border-t border-gray-700">Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col hidden h-screen overflow-hidden" id="main-content">
        <header class="bg-gray-800 border-b border-gray-700 px-8 py-4 flex justify-between items-center">
            <h2 id="page-title" class="text-2xl font-bold text-white">Dashboard</h2>
            <button id="add-new-btn" class="hidden bg-pink-600 text-white px-4 py-2 rounded shadow hover:bg-pink-700">Add New Item</button>
        </header>
        
        <div class="flex-1 overflow-y-auto p-8">
            <div id="content-area" class="bg-gray-800 border border-gray-700 rounded-lg shadow-xl p-6"></div>
        </div>
    </main>

    <script src="/admin/app.js"></script>
</body>
</html>
